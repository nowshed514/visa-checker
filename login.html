<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7ff;
}

.card{
    max-width:450px;
    margin:auto;
    margin-top:100px;
    border-radius:20px;
}

</style>

</head>
<body>

<div class="container">

    <div class="card shadow">

        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                Admin Login
            </h2>

            <form id="loginForm">

                <div class="mb-3">
                    <input
                    id="username"
                    type="text"
                    class="form-control"
                    placeholder="Username"
                    required>
                </div>

                <div class="mb-3">
                    <input
                    id="password"
                    type="password"
                    class="form-control"
                    placeholder="Password"
                    required>
                </div>

                <button
                type="submit"
                class="btn btn-primary w-100">

                    Login

                </button>

            </form>

            <div
            id="error"
            class="text-danger mt-3 text-center">

            </div>

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
