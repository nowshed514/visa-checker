<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Visa Status Checker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container">

    <div class="card shadow-lg border-0">

        <div class="card-body">

            <!-- Logo -->
            <div class="logo">
                <i class="bi bi-globe-central-south-asia"></i>
            </div>

            <h1>
                Visa Status Checker
            </h1>

            <p class="text-muted">
                Check your visa application status instantly
            </p>

            <form id="visaForm">

                <div class="mb-3">

                    <input
                        id="passport"
                        type="text"
                        class="form-control"
                        placeholder="Passport Number"
                        required>

                </div>

                <div class="mb-3">

                    <input
                        id="dob"
                        type="date"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <select
                        id="country"
                        class="form-select"
                        required>

                        <option value="">
                            Select Country
                        </option>

                        <option value="Saudi Arabia">
                            Saudi Arabia
                        </option>

                        <option value="UAE">
                            UAE
                        </option>

                        <option value="Qatar">
                            Qatar
                        </option>

                        <option value="Malaysia">
                            Malaysia
                        </option>

                        <option value="Kuwait">
                            Kuwait
                        </option>

                        <option value="Oman">
                            Oman
                        </option>

                        <option value="Bahrain">
                            Bahrain
                        </option>

                        <option value="Singapore">
                            Singapore
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Check Status

                </button>

            </form>

            <div
                id="resultCard"
                class="result-card mt-4">
            </div>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
