<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7ff;
}

.card{
    max-width:800px;
    margin:auto;
    border-radius:20px;
}

</style>

</head>
<body>

<div class="container py-5">

    <div class="card shadow">

        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                Admin Panel
            </h2>
            <div class="text-end mb-3">

    <button
    id="logoutBtn"
    class="btn btn-danger">

        Logout

    </button>

</div>

            <form id="adminForm">

                <div class="mb-3">
                    <input
                    id="name"
                    type="text"
                    class="form-control"
                    placeholder="Applicant Name">
                </div>

                <div class="mb-3">
                    <input
                    id="passport"
                    type="text"
                    class="form-control"
                    placeholder="Passport Number">
                </div>

                <div class="mb-3">
                    <input
                    id="dob"
                    type="date"
                    class="form-control">
                </div>

                <div class="mb-3">

                    <select
                    id="country"
                    class="form-select">

                        <option>Saudi Arabia</option>
                        <option>UAE</option>
                        <option>Qatar</option>

                    </select>

                </div>

                <div class="mb-3">

                    <select
                    id="visaType"
                    class="form-select">

                        <option>Work Visa</option>
                        <option>Visit Visa</option>

                    </select>

                </div>

                <div class="mb-3">

                    <select
                    id="status"
                    class="form-select">

                        <option>Approved</option>
                        <option>Pending</option>
                        <option>Rejected</option>

                    </select>

                </div>

                <button
                class="btn btn-primary w-100">

                    Add Applicant

                </button>

            </form>
            <hr class="my-4">

<h4 class="mb-3">Applicant List</h4>

<div class="table-responsive">
    <table class="table table-bordered" id="applicantTable">

        <thead>

           <tr>
    <th>Name</th>
    <th>Passport</th>
    <th>DOB</th>
    <th>Country</th>
    <th>Visa Type</th>
    <th>Status</th>
    <th>Action</th>
</tr>

        </thead>

        <tbody>

        </tbody>

    </table>
</div>

        </div>

    </div>

</div>

<script src="app.js"></script>
<script>

if(
localStorage.getItem("isLoggedIn")
!== "true"
){

    window.location.href =
    "login.html";

}

</script>
</body>
</html>
